<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华联中学 - 学生评语系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .subject-tabs { display:flex; gap:0.35rem; flex-wrap:wrap; margin-bottom:0.75rem; }
    .subject-tab { padding:0.5rem 1rem; border-radius:20px; border:1px solid #e2e8f0; cursor:pointer; font-size:0.85rem; font-weight:600; background:#fff; transition:all 0.2s; white-space:nowrap; }
    .subject-tab:hover { border-color:var(--pico-primary); background:#eff6ff; }
    .subject-tab.active { background:var(--pico-primary); color:#fff; border-color:var(--pico-primary); }
    .student-row { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0.5rem; border-bottom:1px solid #f1f5f9; }
    .student-row:hover { background:#f8fafc; }
    .student-row .idx { width:30px; text-align:center; font-size:0.8rem; color:#94a3b8; flex-shrink:0; }
    .student-row .photo-wrap { width:48px; height:48px; border-radius:50%; overflow:hidden; flex-shrink:0; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:1.1rem; }
    .student-row .photo-wrap img { width:100%; height:100%; object-fit:cover; }
    .student-row .info { flex:1; min-width:0; }
    .student-row .info .name { font-weight:700; font-size:0.9rem; }
    .student-row .info .meta { font-size:0.7rem; color:#94a3b8; }
    .student-row .fb { flex:2; min-width:0; }
    .student-row .fb textarea { width:100%; padding:0.4rem 0.6rem; font-size:0.85rem; border-radius:8px; border:1px solid #e2e8f0; resize:vertical; min-height:44px; font-family:inherit; }
    .student-row .fb textarea:focus { border-color:var(--pico-primary); outline:none; box-shadow:0 0 0 3px rgba(26,86,219,0.1); }
    .student-row .status-col { width:60px; text-align:center; flex-shrink:0; }
    .done-dot { display:inline-block; width:12px; height:12px; border-radius:50%; }
    .done-dot.yes { background:#16a34a; }
    .done-dot.no { background:#e2e8f0; border:2px solid #cbd5e1; }
    .row-complete { background:#f0fdf4; }
    @media (max-width:768px) { .student-row { flex-wrap:wrap; } .student-row .fb { flex:100%; } }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container">
      <nav>
        <ul>
          <li><strong style="font-size:1.1rem;"><i class="fa-solid fa-graduation-cap" style="color:var(--pico-primary);"></i> 华联中学</strong></li>
          <li><span id="user-badge" style="font-size:0.8rem;background:#e0e7ff;color:#3730a3;padding:0.2rem 0.6rem;border-radius:12px;font-weight:600;"></span></li>
          <li id="nav-dash" style="display:none;"><a href="form-teacher.html" class="outline" style="font-size:0.8rem;padding:0.2rem 0.6rem;">📊 班主任后台</a></li>
          <li><a href="#" onclick="showChangePwd()" style="font-size:0.8rem;">🔑 改密码</a></li>
          <li><a href="#" onclick="doLogout()" style="color:#ef4444;font-size:0.8rem;">退出</a></li>
          <li>
            <div class="lang-switcher">
              <button onclick="setLang('zh')" id="lb-zh">中</button>
              <button onclick="setLang('en')" id="lb-en">EN</button>
              <button onclick="setLang('ms')" id="lb-ms">BM</button>
            </div>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:1rem;">
    <!-- Subject Tabs -->
    <div id="subject-tabs" class="subject-tabs"></div>

    <!-- Progress -->
    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem;">
      <progress id="prog-bar" value="0" max="100" style="flex:1; height:10px; margin:0;"></progress>
      <span id="prog-text" style="font-weight:700; font-size:0.9rem; white-space:nowrap;">0/0</span>
    </div>

    <!-- Student List -->
    <article class="premium-card" style="padding:1rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
        <div>
          <input type="search" id="search-box" placeholder="🔍 搜索学生..." oninput="renderAll()" style="max-width:250px; font-size:0.85rem; padding:0.3rem 0.6rem;">
          <span id="student-count" style="font-size:0.8rem; color:#94a3b8; margin-left:0.5rem;"></span>
        </div>
        <button class="outline" style="font-size:0.8rem; color:#10b981; border-color:#10b981; padding:0.3rem 0.75rem;" onclick="exportCSV()">📥 导出CSV</button>
      </div>
      <div id="student-rows"></div>
    </article>
  </main>

  <!-- Password Modal -->
  <dialog id="pwd-modal">
    <article style="max-width:400px;">
      <h4>修改密码</h4>
      <div id="pwd-err" style="display:none;color:#ef4444;margin-bottom:0.5rem;"></div>
      <input type="password" id="pwd-old" placeholder="原密码" style="margin-bottom:0.5rem;">
      <input type="password" id="pwd-new" placeholder="新密码" style="margin-bottom:0.5rem;">
      <input type="password" id="pwd-confirm" placeholder="确认新密码" style="margin-bottom:0.5rem;">
      <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
        <button class="secondary" onclick="document.getElementById('pwd-modal').close()">取消</button>
        <button onclick="doChangePwd()">修改密码</button>
      </div>
    </article>
  </dialog>

  <!-- Dark Mode -->
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

  <script src="js/auth.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/report-api.js"></script>
  <script>
    // ====== GLOBALS ======
    let SUBJECTS = [];       // [{code, name, emoji, students:[{studentId, nameZh, nameEn, gender, hostel, photo, feedback, isComplete}]}]
    let currentSubIdx = 0;
    let saveTimers = {};    // Debounce timers per student

    // ====== INIT ======
    (async function init() {
      // Check auth
      const user = getUser();
      if (!user || !getToken()) { window.location.href = 'teacher-login.html'; return; }

      // Update UI
      updateLangBtns();
      document.getElementById('user-badge').textContent = user.display_name || user.username;
      if (user.role === 'form_teacher') {
        document.getElementById('nav-dash').style.display = '';
      }

      // Load class config
      const cfg = await LocalData.loadConfig();
      const year = cfg.currentAcademicYear || '2026';
      const activeStudents = LocalData.getActiveStudents(year);

      // Determine teacher's subjects
      let teacherSubjects;
      if (user.role === 'form_teacher') {
        teacherSubjects = cfg.subjects || [];
      } else {
        const teacher = (cfg.teachers || []).find(t => t.username === user.username);
        const codes = teacher ? teacher.subjects : [];
        teacherSubjects = (cfg.subjects || []).filter(s => codes.includes('*') || codes.includes(s.code));
      }

      // Build subject data with students + load from localStorage
      SUBJECTS = teacherSubjects.map(sub => ({
        code: sub.code,
        name: sub.name,
        name_en: sub.name_en,
        name_ms: sub.name_ms,
        emoji: sub.emoji,
        students: activeStudents.map(st => {
          const key = `report_${year}_${st.studentId}_${sub.code}`;
          const saved = JSON.parse(localStorage.getItem(key) || 'null');
          return {
            studentId: st.studentId,
            studentNo: st.studentNo,
            nameZh: st.nameZh,
            nameEn: st.nameEn,
            gender: st.gender,
            hostel: st.hostel,
            photo: st.photo || ('photos/' + st.studentId + '.jpg'),
            // Privacy fields (only for form teacher)
            studentPhone: st.studentPhone || '',
            fatherPhone: st.fatherPhone || '',
            motherPhone: st.motherPhone || '',
            address: st.address || '',
            siblings: st.siblings || '',
            // Report data
            feedback: saved ? saved.feedback : '',
            isComplete: saved ? saved.isComplete : 0
          };
        })
      }));

      if (SUBJECTS.length === 0) {
        document.getElementById('student-rows').innerHTML = '<p style="text-align:center;padding:3rem;color:#94a3b8;">你没有被分配任何科目。请联系班主任。</p>';
        return;
      }

      // Render
      renderTabs();
      selectSubject(0);
    })();

    // ====== SUBJECT TABS ======
    function renderTabs() {
      const container = document.getElementById('subject-tabs');
      container.innerHTML = SUBJECTS.map((s, i) => {
        const lang = getLang();
        let name = s.name;
        if (lang === 'en') name = s.name_en || s.name;
        if (lang === 'ms') name = s.name_ms || s.name;
        const done = s.students.filter(st => st.isComplete === 1).length;
        const total = s.students.length;
        return `<span class="subject-tab" onclick="selectSubject(${i})" id="tab-${i}">${s.emoji} ${name} <small style="opacity:0.7;">${done}/${total}</small></span>`;
      }).join('');
    }

    function selectSubject(idx) {
      currentSubIdx = idx;
      document.querySelectorAll('.subject-tab').forEach((el, i) => el.classList.toggle('active', i === idx));
      renderAll();
    }

    // ====== RENDER STUDENTS ======
    function renderAll() {
      if (SUBJECTS.length === 0) return;
      const sub = SUBJECTS[currentSubIdx];
      const user = getUser();
      const isFT = user && user.role === 'form_teacher';
      const searchQ = (document.getElementById('search-box').value || '').toLowerCase();

      const filtered = sub.students.filter(st => {
        if (!searchQ) return true;
        return st.nameZh.toLowerCase().includes(searchQ) ||
               st.nameEn.toLowerCase().includes(searchQ) ||
               st.studentId.includes(searchQ);
      });

      const container = document.getElementById('student-rows');
      container.innerHTML = filtered.map((st, i) => {
        const rowClass = st.isComplete === 1 ? 'student-row row-complete' : 'student-row';
        const photoHTML = `<img src="${st.photo}" onerror="this.style.display='none';this.parentElement.textContent='${st.nameZh.substring(0,1)}';" loading="lazy">`;

        // Privacy: subject teachers see name+ID+gender only
        let metaHTML = `学号: ${st.studentId} | ${st.gender === 'M' ? '男' : '女'}`;
        if (isFT) {
          metaHTML += ` | ${st.hostel ? '🏠寄宿' : '🚶通勤'}`;
          if (st.siblings) metaHTML += ` | 兄妹: ${st.siblings}`;
        }

        return `
          <div class="${rowClass}" id="row-${st.studentId}">
            <div class="idx">${i + 1}</div>
            <div class="photo-wrap" style="background:${avatarColor(st.studentId)};">${photoHTML}</div>
            <div class="info">
              <div class="name">${st.nameZh}</div>
              <div class="meta">${st.nameEn}</div>
              <div class="meta">${metaHTML}</div>
            </div>
            <div class="fb">
              <textarea id="ta-${st.studentId}" placeholder="输入评语..."
                oninput="onType('${st.studentId}')"
                onblur="onBlur('${st.studentId}')">${escHtml(st.feedback)}</textarea>
            </div>
            <div class="status-col">
              <span class="done-dot ${st.isComplete === 1 ? 'yes' : 'no'}" id="dot-${st.studentId}" title="${st.isComplete === 1 ? '已完成' : '未完成'}"></span>
            </div>
          </div>`;
      }).join('');

      document.getElementById('student-count').textContent = `${filtered.length}/${sub.students.length} 学生`;
      updateProgress();
    }

    function avatarColor(id) {
      const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f43f5e','#6366f1'];
      const n = parseInt(id.replace(/\D/g,'')) || 0;
      return colors[n % colors.length];
    }

    // ====== SAVE ======
    function onType(studentId) {
      // Debounce save
      if (saveTimers[studentId]) clearTimeout(saveTimers[studentId]);
      // Update dot immediately
      const ta = document.getElementById('ta-' + studentId);
      const hasText = ta.value.trim().length > 0;
      const dot = document.getElementById('dot-' + studentId);
      if (dot) { dot.className = 'done-dot ' + (hasText ? 'yes' : 'no'); }

      saveTimers[studentId] = setTimeout(() => saveOne(studentId), 800);
    }

    function onBlur(studentId) {
      if (saveTimers[studentId]) clearTimeout(saveTimers[studentId]);
      saveOne(studentId);
    }

    async function saveOne(studentId) {
      const sub = SUBJECTS[currentSubIdx];
      const st = sub.students.find(s => s.studentId === studentId);
      if (!st) return;
      const ta = document.getElementById('ta-' + studentId);
      if (!ta) return;
      const feedback = ta.value;
      const isComplete = feedback.trim().length > 0 ? 1 : 0;

      // Update local state
      st.feedback = feedback;
      st.isComplete = isComplete;

      // Update dot and row
      const dot = document.getElementById('dot-' + studentId);
      if (dot) { dot.className = 'done-dot ' + (isComplete ? 'yes' : 'no'); }
      const row = document.getElementById('row-' + studentId);
      if (row) { row.classList.toggle('row-complete', isComplete === 1); }

      // Save to localStorage (offline-first)
      const cfg = await LocalData.loadConfig();
      const year = cfg.currentAcademicYear || '2026';
      const key = `report_${year}_${studentId}_${sub.code}`;
      localStorage.setItem(key, JSON.stringify({ feedback, isComplete, updatedAt: new Date().toISOString() }));

      // Log activity
      if (window._logActivity) window._logActivity(`save_${studentId}_${sub.code}`);

      // Update progress & tabs
      updateProgress();
      updateTabCounts();

      // Try backend (fire-and-forget)
      try { await ReportAPI.saveReport(parseInt(studentId)||0, sub.code, feedback, isComplete===1); } catch(e) {}
    }

    // ====== PROGRESS ======
    function updateProgress() {
      const sub = SUBJECTS[currentSubIdx];
      const total = sub.students.length;
      const done = sub.students.filter(s => s.isComplete === 1).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('prog-bar').value = pct;
      document.getElementById('prog-text').textContent = `${done}/${total} (${pct}%)`;
    }

    function updateTabCounts() {
      SUBJECTS.forEach((sub, i) => {
        const tab = document.getElementById('tab-' + i);
        if (tab) {
          const done = sub.students.filter(s => s.isComplete === 1).length;
          tab.innerHTML = tab.innerHTML.replace(/<small.*<\/small>/, `<small style="opacity:0.7;">${done}/${sub.students.length}</small>`);
        }
      });
    }

    // ====== EXPORT ======
    function exportCSV() {
      const sub = SUBJECTS[currentSubIdx];
      const lang = getLang();
      let subName = sub.name;
      if (lang === 'en') subName = sub.name_en || sub.name;
      if (lang === 'ms') subName = sub.name_ms || sub.name;
      let csv = '﻿序号,学号,中文名,英文名,性别,评语,状态\n';
      sub.students.forEach((st, i) => {
        csv += `${i+1},"${st.studentId}","${st.nameZh}","${st.nameEn}","${st.gender}","${(st.feedback||'').replace(/"/g,'""')}","${st.isComplete===1?'已完成':'未完成'}"\n`;
      });
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `${subName}_评语.csv`; a.click();
    }

    // ====== PASSWORD ======
    function showChangePwd() { document.getElementById('pwd-modal').showModal(); }
    async function doChangePwd() {
      const oldP = document.getElementById('pwd-old').value;
      const newP = document.getElementById('pwd-new').value;
      const cfm = document.getElementById('pwd-confirm').value;
      const err = document.getElementById('pwd-err');
      if (newP !== cfm) { err.textContent = '两次密码不一致'; err.style.display='block'; return; }
      try {
        await ReportAPI.changePassword(oldP, newP);
        alert('密码修改成功！');
        document.getElementById('pwd-modal').close();
      } catch(e) { err.textContent = e.message; err.style.display='block'; }
    }

    // ====== LOGOUT ======
    function doLogout() { clearToken(); clearUser(); sessionStorage.clear(); window.location.href = 'teacher-login.html'; }

    // ====== LANGUAGE ======
    function updateLangBtns() {
      const lang = getLang();
      ['zh','en','ms'].forEach(l => {
        const btn = document.getElementById('lb-'+l);
        if (btn) btn.classList.toggle('active', l === lang);
      });
    }
    document.addEventListener('langChanged', () => {
      updateLangBtns();
      renderTabs();
      renderAll();
    });

    // ====== THEME ======
    function toggleTheme() {
      const html = document.documentElement;
      const cur = html.getAttribute('data-theme');
      html.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
      localStorage.setItem('report_theme', cur === 'dark' ? 'light' : 'dark');
    }
    (function(){ const t = localStorage.getItem('report_theme'); if(t) document.documentElement.setAttribute('data-theme', t); })();

    // ====== UTILS ======
    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
